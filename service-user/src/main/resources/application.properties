spring.application.name=service-user
server.port=8081

# MariaDB Database Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/service_user?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456789

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=MiniFoodOrderingSystemSecretKeyForJWTAuthenticationPurposeOnly2026
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.orion.serviceuser=DEBUG
